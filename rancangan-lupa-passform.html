<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe Login Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col md:flex-row overflow-hidden text-gray-900">

    <!-- Left Side: Form -->
    <div class="w-full md:w-1/2 flex flex-col items-center justify-center p-6 md:p-12 relative bg-white min-h-screen">
        <!-- Back Button -->
        <div class="absolute top-6 left-6">
            <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center font-bold text-gray-500 border border-gray-300">
                &larr;
            </div>
        </div>

        <div class="w-full max-w-md">
            <!-- Header -->
            <div class="mb-8">
                <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Login</h1>
                <p class="text-gray-500">Silakan Masuk ke Akun Anda</p>
            </div>
            
            <!-- Form -->
            <div class="space-y-4">
                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <div class="h-10 w-full px-4 rounded-lg border border-gray-300 bg-white flex items-center text-gray-400 text-sm">
                        nama@email.com
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="h-10 w-full px-4 rounded-lg border border-gray-300 bg-white flex items-center justify-between text-gray-400 text-sm">
                        <span>Masukkan password</span>
                        <div class="w-5 h-5 bg-gray-200 rounded text-xs flex items-center justify-center text-gray-500">O</div>
                    </div>
                    <div class="text-right mt-2">
                        <span class="text-sm text-gray-600 font-medium underline">Lupa Password?</span>
                    </div>
                </div>

                <!-- Spacer -->
                <div class="h-2"></div>

                <!-- Button Login -->
                <div class="w-full bg-gray-800 text-white py-3 rounded-lg font-semibold flex items-center justify-center cursor-pointer">
                    Masuk
                </div>

                <!-- Link ke Register -->
                <div class="text-center text-sm text-gray-500 mt-4">
                    Belum punya akun? <span class="text-gray-900 font-semibold underline">Daftar di sini</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Right Side: UI/UX Visual -->
    <div class="hidden md:flex md:w-1/2 relative bg-gray-100 items-center justify-center overflow-hidden border-l border-gray-300">
        
        <div class="relative z-20 w-4/5 h-4/5 flex flex-col items-center justify-center text-gray-700 text-center p-8">
            <div class="relative w-full aspect-square max-w-md mb-12 bg-gray-200 border border-gray-300 rounded-2xl flex items-center justify-center text-gray-500 font-bold text-xl shadow-sm">
                ILUSTRASI GAMBAR LOGIN
            </div>
            
            <h2 class="text-3xl font-bold mb-4 text-gray-900">Sistem Informasi Akademik</h2>
            <p class="text-gray-600 text-lg max-w-md leading-relaxed">
                Kelola pendaftaran dan informasi akademik Anda dalam satu platform yang terintegrasi dan modern.
            </p>
        </div>
    </div>

</body>
</html>
